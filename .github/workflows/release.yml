name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to rebuild, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build \
            -ldflags "-s -w -X agdev/cmd.version=${VERSION} -X agdev/cmd.commit=${COMMIT} -X agdev/cmd.date=${DATE}" \
            -o dist/agdev .
          tar -C dist -czf dist/agdev_linux_amd64.tar.gz agdev
          (
            cd dist
            sha256sum agdev_linux_amd64.tar.gz > agdev_linux_amd64.tar.gz.sha256
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: |
            dist/agdev_linux_amd64.tar.gz
            dist/agdev_linux_amd64.tar.gz.sha256
